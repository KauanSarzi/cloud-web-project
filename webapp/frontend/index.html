<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projeto Cloud</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f14;
      color: #b0c8d8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 1.6rem;
      color: #00cfee;
      margin-bottom: 8px;
    }

    p {
      font-size: 0.85rem;
      color: #4a6070;
      margin-bottom: 30px;
    }

    button {
      background: transparent;
      border: 1px solid #00cfee;
      color: #00cfee;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      padding: 10px 24px;
      cursor: pointer;
    }

    button:hover {
      background: rgba(0, 207, 238, 0.1);
    }

    #resultado {
      margin-top: 24px;
      font-size: 1rem;
      color: #00e676;
      min-height: 24px;
    }

    #resultado.erro {
      color: #ff4d6a;
    }
  </style>
</head>
<body>

  <h1>Projeto AWS + Docker</h1>
  <p>Aplicação Web conectada ao backend Java</p>

  <button onclick="buscarMensagem()">Buscar mensagem</button>

  <div id="resultado"></div>

  <script>
    async function buscarMensagem() {
      const resultado = document.getElementById('resultado');
      resultado.className = '';
      resultado.textContent = 'Carregando...';

      try {
        const response = await fetch('/mensagem');
        const data = await response.json();
        resultado.textContent = data.mensagem;
      } catch (error) {
        resultado.textContent = 'Erro ao conectar com backend';
        resultado.className = 'erro';
      }
    }
  </script>

</body>
</html>
